<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Temoins</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta property="og:site_name" content="TFE De Scheerder Jarne">
    <meta property="og:title" content="Les secrets de la voiture">
    <meta property="og:description" content="TFE De Scheerder Jarne">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jarnedescheerder.be/projets/tfe">
    <meta property="og:image" content="https://jarnedescheerder.be/projets/tfe/public/favico.ico">
    <meta property="og:image:width" content="1800">
    <meta property="og:image:height" content="945">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="stylesheet" href="/styles/app.scss">
    <script type="module" src="scripts/app.js" defer></script>
</head>
<body>
    <button onclick="history.back()" class="btnRetour">← Retour</button>
    <section class="temoins">
        <div class="part" id="TemoinsIntro">
            <h1>Les témoins lumineux</h1>
            <img src="couleurs_temoins.png" alt="image montrant les différentes couches pour avoir une bonne peinture sur une voiture">
        </div>
        <div class="part" id="TemoinsVert">
            <h2>Les témoins verts / bleus :</h2>
            <img src="voyants_vert.png" alt="image montrant les principaux témoins vert/bleu">
        </div>
        <div class="part" id="TemoinsOrange">
            <h2>Les témoins orange :</h2>
            <img src="voyants_orange.png" alt="image montrant les principaux témoins orange">
        </div>
        <div class="part" id="TemoinsRouge">
            <h2>Les témoins rouge :</h2>
            <img src="voyants_rouge.png" alt="image montrant les principaux témoins rouge">
        </div>
        <div class="select-part__container">
            
            <button class="select-part" data-value="TemoinsIntro">
            Introduction&nbsp;témoins&nbsp;lumineux&nbsp;→
            </button>

            <button class="select-part" data-value="TemoinsVert">
            Les&nbsp;principaux&nbsp;témoins&nbsp;verts / bleus&nbsp;→
            </button>

            <button class="select-part" data-value="TemoinsOrange">
            Les&nbsp;principaux&nbsp;témoins&nbsp;orange&nbsp;→
            </button>

            <button class="select-part" data-value="TemoinsRouge">
            Les&nbsp;principaux&nbsp;témoins&nbsp;rouges&nbsp;→
            </button>

        </div>
    </section>
</body>
</html>
