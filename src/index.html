<!DOCTYPE html>
<html lang="fr">
<head>
    <title>TFE - De Scheerder Jarne</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta property="og:site_name" content="TFE De Scheerder Jarne">
    <meta property="og:title" content="Les secrets de la voiture">
    <meta property="og:description" content="TFE De Scheerder Jarne">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jarnedescheerder.be/projets/tfe">
    <meta property="og:image" content="https://jarnedescheerder.be/projets/tfe/public/favico.ico">
    <meta property="og:image:width" content="1800">
    <meta property="og:image:height" content="945">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="stylesheet" href="styles/app.scss">
    <script src="scripts/app.js" defer></script>
</head>
<body>
    <section class="accueil">
        <h1>Bienvenue sur «Les secrets de la voiture».</h1>
        <h2>Ici vous allez pouvoir tout apprendre sur votre véhicule.</h2>
        <p>Vous pouvez remplir le formulaire ci-dessous ou directement appuyer sur le bouton «Commencer».</p>
    </section>
    <section class="form__accueil">
        <div class="form__elements">
            <h3>Nouvelle voiture :</h3>
            <div class="form">
                <label for="MVoiture">Marque de la voiture :</label><br>
                <input type="text" id="MVoiture" name="marqueVoiture" placeholder="Marque">
            </div>
            <div class="form">
                <label for="typeVoiture">Type de voiture :</label><br>

                <div class="select-wrapper">
                    <select id="typeVoiture" name="typeVoiture">
                        <option value="">Sélectionner un type</option>
                        <option value="essence">Essence</option>
                        <option value="diesel">Diesel</option>
                        <option value="mhev">MHEV</option>
                        <option value="hev">HEV</option>
                        <option value="phev">PHEV</option>
                        <option value="electrique">Électrique</option>
                    </select>
                </div>
            </div>
            <button id="ajouterVoiture">Ajouter la voiture</button>
        </div>
        <div class="voituresEnregistrees">
            <h3>Voiture enregistrées :</h3>
            <div id="listeVoitures"></div>
        </div>
    </section>
    <a href="selection.html" class="commencer">Commencer →</a>
</body>
</html>
